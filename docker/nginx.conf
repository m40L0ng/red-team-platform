# Nginx config for the frontend container.
# Serves the React SPA and proxies /api/* and /health to the api container.
# SSL cert is generated automatically on first start (self-signed).
# To use a real certificate, mount cert.pem + key.pem at /etc/nginx/certs/.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    root  /usr/share/nginx/html;
    index index.html;

    # Must be >= multer upload limit (10 MB)
    client_max_body_size 15M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check (proxied to the API) ────────────────────────────────────
    location = /health {
        proxy_pass http://api:3001/health;
        access_log off;
    }

    # ── React Router — SPA fallback ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Nginx config used inside the Docker container.
# SSL termination is expected upstream (host nginx or load balancer).
# See /nginx.conf in the project root for the host-level HTTPS config.

server {
    listen 80;
    server_name _;

    # Must be >= multer upload limit (10 MB)
    client_max_body_size 15M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location = /health {
        proxy_pass http://app:3001/health;
        access_log off;
    }
}

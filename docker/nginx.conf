# Nginx config for the frontend container.
# Serves the React SPA and proxies /api/* and /health to the api container.
# SSL termination is expected upstream (host nginx or load balancer).
# See /nginx.conf in the project root for the host-level HTTPS config.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Must be >= multer upload limit (10 MB)
    client_max_body_size 15M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check (proxied to the API) ────────────────────────────────────
    location = /health {
        proxy_pass http://api:3001/health;
        access_log off;
    }

    # ── React Router — SPA fallback ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

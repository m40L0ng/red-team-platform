services:
  db:
    image: postgres:16-alpine
    container_name: redteam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: redteam_secret
      POSTGRES_DB: redteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam -d redteam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

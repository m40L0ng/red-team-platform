services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: redteam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-redteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redteam_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-redteam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redteam} -d ${POSTGRES_DB:-redteam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── API (Express) ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: redteam_api
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-redteam}:${POSTGRES_PASSWORD:-redteam_secret}@db:5432/${POSTGRES_DB:-redteam}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      # Origin allowed by CORS — must match the URL users access the app from
      CLIENT_URL:   ${CLIENT_URL:-https://localhost}
    volumes:
      - uploads:/app/server/uploads/evidence
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (nginx: React SPA + API proxy) ────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    container_name: redteam_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  uploads:
  certs:

networks:
  internal:
    driver: bridge

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: redteam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-redteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redteam_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-redteam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redteam} -d ${POSTGRES_DB:-redteam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── App (Express API + React build) ───────────────────────────────────────
  app:
    build: .
    container_name: redteam_app
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-redteam}:${POSTGRES_PASSWORD:-redteam_secret}@db:5432/${POSTGRES_DB:-redteam}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - uploads:/app/server/uploads/evidence
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Nginx (reverse proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: redteam_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  postgres_data:
  uploads:

networks:
  internal:
    driver: bridge
